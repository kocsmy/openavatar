name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version && xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Assemble app bundle
        run: ./scripts/make-app.sh release
