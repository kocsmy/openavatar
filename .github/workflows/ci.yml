name: CI

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Create a GitHub Release with this tag (e.g. v1.0.0); leave empty to just build"
        required: false
        default: ""

permissions:
  contents: write # tag pushes create releases with the DMG attached

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version && xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Assemble app bundle
        run: ./scripts/make-app.sh release

      - name: Build DMG installer
        run: ./scripts/make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenAvatar-dmg
          path: build/OpenAvatar.dmg
          if-no-files-found: error

      - name: Release (on version tags, or manual dispatch with release_tag)
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
        run: |
          gh release create "${TAG}" build/OpenAvatar.dmg \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "OpenAvatar ${TAG}" \
            --notes "Drag-and-drop DMG installer for macOS 14.4+. The app is ad-hoc signed (not notarized): after dragging to Applications, run \`xattr -cr /Applications/OpenAvatar.app\` before first launch, or right-click → Open."
